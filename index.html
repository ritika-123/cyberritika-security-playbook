<!DOCTYPE html>
<html>
<head>
  <title>Cybersecurity Playbook by CYBERRITIKA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      scroll-behavior: smooth;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #1e293b;
      padding: 10px;
      position: sticky;
      top: 60px;
      z-index: 999;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* NEW: search bar */
    .search-box {
      text-align: center;
      margin-top: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 60%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .card a {
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 40px;
      font-size: 14px;
      color: #94a3b8;
    }

    /* NEW: Light mode */
    .light {
      background: #f1f5f9;
      color: #0f172a;
    }

    .light header,
    .light nav,
    .light footer {
      background: #e2e8f0;
      color: #0f172a;
    }

    .light .card {
      background: #cbd5e1;
    }

    .light .card:hover {
      background: #94a3b8;
    }

    .toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #38bdf8;
      border: none;
      padding: 10px 15px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  🚀 Cybersecurity Playbook
</header>

<nav>
  <a href="#fundamentals">Fundamentals</a>
  <a href="#playbooks">Playbooks</a>
</nav>

<!-- NEW: Search -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search topics like IAM, Risk, Incident..." />
</div>

<div class="hero">
  <h1>Learn Cybersecurity the Right Way</h1>
  <p>For Beginners, Interviews, and CISSP Preparation</p>
</div>

<div class="section" id="fundamentals">
  <h2>📘 Fundamentals</h2>

  <div class="cards" id="fundamentalsCards">
    <div class="card"><a href="fundamentals/cia-triad.html">CIA Triad</a></div>
    <div class="card"><a href="fundamentals/authentication.html">Authentication</a></div>
    <div class="card"><a href="fundamentals/authorization.html">Authorization</a></div>
    <div class="card"><a href="fundamentals/iam.html">IAM</a></div>
    <div class="card"><a href="fundamentals/risk.html">Risk</a></div>
  </div>
</div>

<div class="section" id="playbooks">
  <h2>🛡️ Playbooks</h2>

  <div class="cards" id="playbookCards">
    <div class="card"><a href="playbooks/incident-response.html">Incident Response</a></div>
  </div>
</div>

<footer>
  Built by Ritika Chaurasia 🚀 | Cybersecurity Learning Platform
</footer>

<!-- NEW: Theme Button -->
<button class="toggle-btn" onclick="toggleTheme()">🌙</button>

<script>
/* -----------------------------
   DARK MODE
------------------------------*/
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* -----------------------------
   SEARCH FILTER
------------------------------*/
document.getElementById("search").addEventListener("input", function () {
  const value = this.value.toLowerCase();

  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
